# Đặt file này ở: .github/workflows/ci.yml trong repo của bạn.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cài Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Cài thư viện hệ thống cho webview (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: cargo check
        run: cargo check --all-targets --all-features
      - name: cargo build (release)
        run: cargo build --release
      - name: cargo test
        run: cargo test --all-features

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cài Rust toolchain (kèm clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Cài thư viện hệ thống cho webview (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: cargo-audit-bin
      - name: Cập nhật Cargo.lock
        run: cargo update
      - name: Tự commit Cargo.lock nếu có thay đổi
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: cargo update (cập nhật dependency, vá lỗ hổng nếu có)"
          file_pattern: Cargo.lock
      - name: Cài cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
