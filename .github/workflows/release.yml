name: Build and Release Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: nexus.exe
            asset_name: nexus-windows-x64.zip
          - os: ubuntu-latest
            artifact_name: nexus
            asset_name: nexus-linux-x64.zip
          - os: macos-latest
            artifact_name: nexus
            asset_name: nexus-macos-x64.zip

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: 🐧 Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 🔨 Build release
        run: cargo build --release

      - name: 📁 Prepare and Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir artifact
          Copy-Item target/release/nexus.exe artifact/
          Compress-Archive -Path artifact/* -DestinationPath ${{ matrix.asset_name }}

      - name: 📁 Prepare and Package artifact (Linux & macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir artifact
          cp target/release/${{ matrix.artifact_name }} artifact/
          zip -r ${{ matrix.asset_name }} artifact

      - name: 🚀 Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          name: Nexus Browser ${{ github.ref_name }}
          body: |
            ## 🌌 Nexus Browser ${{ github.ref_name }}
            
            Download the appropriate version for your operating system:
            - **Windows**: `nexus-windows-x64.zip`
            - **Linux**: `nexus-linux-x64.zip`
            - **macOS**: `nexus-macos-x64.zip`
            
            **Note:** For Tor/WARP, ensure their respective clients are running locally.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
