<div align="center">
<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#16213E" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#00B4D8" />
    </linearGradient>
    <linearGradient id="dragonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0" />
      <stop offset="100%" stop-color="#606060" />
    </linearGradient>
  </defs>
  
  <!-- Đuôi rồng -->
  <path d="M 140 190 C 80 180, 60 120, 100 100" fill="none" stroke="url(#dragonGrad)" stroke-width="12" stroke-linecap="round" />
  <!-- Thân rồng -->
  <path d="M 100 100 C 140 80, 140 140, 100 160 C 60 180, 80 120, 120 100" fill="none" stroke="url(#dragonGrad)" stroke-width="14" stroke-linecap="round" />
  <!-- Cổ rồng -->
  <path d="M 120 100 C 140 60, 160 60, 150 100" fill="none" stroke="url(#dragonGrad)" stroke-width="12" stroke-linecap="round" />
  <!-- Đầu rồng -->
  <polygon points="140,80 170,90 160,110 130,110" fill="url(#dragonGrad)" />
  <circle cx="160" cy="95" r="2" fill="#00FFFF" />

  <!-- Khiên -->
  <path d="M 140 60 L 220 60 L 220 130 C 220 160, 180 180, 140 200 C 100 180, 60 160, 60 130 L 60 60 Z" fill="url(#shieldGrad)" stroke="url(#cyanGrad)" stroke-width="4" rx="10" />
  
  <!-- Chữ N trong khiên -->
  <text x="140" y="140" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#cyanGrad)" text-anchor="middle">N</text>
  
  <!-- Text Nexus -->
  <text x="300" y="110" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#cyanGrad)">NEXUS</text>
  <text x="300" y="140" font-family="Arial, sans-serif" font-size="18" fill="#8A8B8E">SECURE &amp; AI BROWSER</text>
  <text x="300" y="180" font-family="Arial, sans-serif" font-size="12" fill="#8A8B8E">Architected &amp; Built by Claude | Qwen | GLM 5.2</text>
</svg>
</div>
