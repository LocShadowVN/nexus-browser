<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E13" />
      <stop offset="100%" stop-color="#12161F" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B212B" />
      <stop offset="100%" stop-color="#12161D" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5EE8D6" />
      <stop offset="100%" stop-color="#2BB5A6" />
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <!-- background card -->
  <rect x="1" y="1" width="598" height="248" rx="20" fill="url(#bgGrad)" stroke="#1F2630" stroke-width="1.5" />

  <!-- soft glow behind the shield -->
  <ellipse cx="135" cy="125" rx="95" ry="95" fill="#2BB5A6" opacity="0.16" filter="url(#softGlow)" />

  <!-- shield -->
  <path d="M 55 60 Q 55 42 73 42 L 197 42 Q 215 42 215 60 L 215 108
           C 215 152 182 180 135 208 C 88 180 55 152 55 108 Z"
        fill="url(#shieldGrad)" stroke="url(#tealGrad)" stroke-width="3" stroke-linejoin="round" />

  <!-- N monogram -->
  <text x="133" y="150" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800"
        fill="url(#tealGrad)" text-anchor="middle">N</text>

  <!-- wordmark -->
  <text x="260" y="115" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="52" font-weight="700" letter-spacing="-1" fill="#E7ECF2">NEXUS</text>

  <text x="262" y="144" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="14" letter-spacing="3" fill="#8B95A3">SECURE &amp; AI-NATIVE BROWSER</text>

  <line x1="262" y1="160" x2="540" y2="160" stroke="#232B36" stroke-width="1" />

  <text x="262" y="188" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="13" fill="#FF8A3D">// built with Claude · Qwen · GLM</text>

  <text x="262" y="210" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace"
        font-size="12" fill="#5B6472">Rust · MPL-2.0 / Apache-2.0 · open source</text>
</svg>
